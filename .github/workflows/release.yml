name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  EXTENSION_UUID: ff-profiles@seblebs.de

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      # GNOME Extensions zip — files must sit at the root of the archive,
      # not inside a subdirectory, for extensions.gnome.org to accept it.
      - name: Package — GNOME Extensions zip
        run: |
          zip -j "${{ env.EXTENSION_UUID }}.zip" \
            extension/extension.js \
            extension/metadata.json

      # Full installable tarball — extract and run `make install`.
      - name: Package — installable tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGEDIR="ff-profiles-${VERSION}"
          mkdir -p "$STAGEDIR"
          cp target/release/ff-profiles "$STAGEDIR/"
          cp -r extension "$STAGEDIR/"
          cp -r data "$STAGEDIR/"
          cp Makefile README.md "$STAGEDIR/"
          tar -czf "ff-profiles-${VERSION}-x86_64-linux.tar.gz" "$STAGEDIR"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-${{ steps.version.outputs.version }}
          path: |
            ${{ env.EXTENSION_UUID }}.zip
            ff-profiles-*-x86_64-linux.tar.gz
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            ${{ env.EXTENSION_UUID }}.zip
            ff-profiles-*-x86_64-linux.tar.gz
          generate_release_notes: true
